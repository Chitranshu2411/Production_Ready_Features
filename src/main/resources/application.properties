spring.application.name=prod-ready-features
#spring.datasource.url=jdbc:mysql://localhost:3306/prod_ready_features?useSSL=false
spring.datasource.url=jdbc:mysql://localhost:3306/prod_ready_features?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#open api doc configuration
springdoc.api-docs.enabled=true

server.port=8081

employeeService.base.url=http://localhost:8080/

#logging configuration
logging.level.com.codingshuttle.prod_ready_features.prod_ready_features.Clients=TRACE
logging.level.com.codingshuttle.prod_ready_features.prod_ready_features.config=INFO
logging.pattern.console=%clr(%d{dd-MM-yyyy HH:mm:ss.SSS}){yellow} %clr(%level){green} [%c{2}] --- %m%n
#logging.file.name=applicatio.log
#loggin.config=classpath:logback-spring.xml
#logging.level.root=DEBUG

#actuator configuration
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
info.app.author=Chitranshu Yadav
info.app.version=1.0.0
info.app.documentation=https://codingshuttle.com/docs
management.endpoint.env.show-values=always
#management.endpoint.env.roles=admin
management.info.build.enabled=true
management.info.git.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true